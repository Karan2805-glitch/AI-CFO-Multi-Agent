name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest

    # ── Real Postgres service — no SQLite ────────────────────────────────────
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: aicfo
          POSTGRES_PASSWORD: aicfo_test
          POSTGRES_DB: aicfo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 .
        continue-on-error: true   # style issues should warn, not block

      - name: Run pytest (with Postgres)
        run: pytest

  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true   # linting warnings should not block merges

      - name: Run Vitest
        run: npm run test
        continue-on-error: true   # non-blocking until test suite is mature

  docker-build-verify:
    needs: [ backend-test, frontend-test ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Compose services
        run: docker compose build backend db

      - name: Start backend and verify health endpoint
        run: |
          docker compose up -d backend db
          echo "Waiting for backend to be healthy..."
          # Max 60 seconds (12 * 5s)
          for i in {1..12}; do
            if curl -s -f http://localhost:8000/health; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 5
          done
          echo "Error: Backend health check failed"
          docker compose logs backend
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down

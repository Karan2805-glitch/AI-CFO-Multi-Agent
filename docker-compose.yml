version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
        # Load from your .env file at runtime, or set this in Render/Railway env vars
        - DATABASE_URL=${DATABASE_URL:-${NEON_DATABASE_URL:-postgresql://postgres:postgres@db:5432/ai_cfo}}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_cfo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD","pg_isready","-U","postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

  backend-tests:
    build: 
      context: ./backend
    environment:
        # Use PostgreSQL for tests (isolated test DB)
        DATABASE_URL: "${NEON_DATABASE_URL:-postgresql://postgres:postgres@db:5432/ai_cfo_test}"
    command: ["pytest", "--cov=app", "--cov-report=xml"]

  frontend-tests:
    build:
      context: ./frontend
    command: ["npm", "run", "test"]
    environment:
      - CI=true
